name: DocScanAI
options:
  bundleIdPrefix: com.docscanai
  deploymentTarget:
    iOS: "16.4"
  xcodeVersion: "14.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.8"
    DEVELOPMENT_TEAM: "525CFXHL5D"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: false
    CLANG_ENABLE_MODULES: true

targets:
  DocScanAI:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Views
      - path: Services
    resources:
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.docscanai.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: App/DocScanAI.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.docscanai.app
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.docscanai.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.docscanai.app

  DocScanAIWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DocScanAIWidget
    settings:
      base:
        INFOPLIST_FILE: DocScanAIWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.docscanai.app.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: DocScanAIWidget/DocScanAIWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.docscanai.app
    dependencies:
      - target: DocScanAI
        embed: false

schemes:
  DocScanAI:
    build:
      targets:
        DocScanAI: all
        DocScanAIWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
